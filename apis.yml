aid: cliniko
url: https://raw.githubusercontent.com/api-evangelist/cliniko/refs/heads/main/apis.yml
name: Cliniko
kind: company
description: Cliniko is practice management software for allied health practices and
  clinics - physiotherapy, osteopathy, chiropractic, podiatry, psychology, massage,
  and similar - covering patient records, appointment scheduling and online bookings,
  practitioners and businesses (locations), treatment notes, invoicing, and payments.
  Cliniko exposes a well-documented public REST API over HTTPS. The API is
  region-sharded - the base host is derived from the shard suffix on your API key
  (for example `https://api.au1.cliniko.com/v1/`) - and is authenticated with an
  API key passed as the username in HTTP Basic authentication. Every request must
  also send a `User-Agent` header containing an app/vendor name and a valid contact
  email, or requests may be blocked.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Practice Management
- Healthcare
- Allied Health
- Appointments
- Scheduling
- Patients
- EHR
- Clinics
- Bookings
- SaaS
