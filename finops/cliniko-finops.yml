description: >-
  FinOps view of Cliniko spend. Cliniko is a per-practitioner SaaS subscription
  billed monthly in USD; cost scales with the number of practitioners in banded
  tiers rather than with API usage. The public REST API is included in the
  subscription at no additional charge, so API adoption does not directly add
  line-item cost - the meaningful variable cost is the practitioner headcount
  band and optional pre-paid SMS credits (used for reminders/confirmations, which
  the API can trigger). Because API calls do not carry per-request fees, FinOps
  attention is on right-sizing the practitioner band, monitoring SMS consumption,
  and staying within the 200-requests-per-minute limit to avoid throttling rather
  than on metered API charges.
notes: >-
  Per-unit SMS rates and tier prices are not reconciled here; verify on
  https://www.cliniko.com/pricing/. API usage is not separately metered or
  billed, so there is no per-call FOCUS charge to allocate - allocation is by
  subscription band and SMS credits.
