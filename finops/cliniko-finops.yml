meters:
- name: practitioner_subscription
  description: Monthly subscription priced by the practitioner-count band; the dominant cost line.
  unit: practitioners
  aggregation: max
  dimensions:
  - account
  - band
- name: sms_credits
  description: Pre-paid SMS messages consumed for reminders/confirmations, billed per message.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - business
- name: api_requests
  description: API requests made against the account. Not billed - tracked only against the 200/minute rate limit.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - user
principles:
- name: Visibility
  description: Track the active practitioner count against the current pricing band, and monitor monthly SMS credit burn.
- name: Allocation
  description: Attribute subscription cost by practitioner and SMS usage by business/location; API calls carry no direct charge to allocate.
- name: Optimization
  description: Right-size the practitioner band, avoid over-provisioning SMS credits, and batch/paginate API calls (larger per_page, q[] filters) to stay under the rate limit without adding cost.
- name: Accountability
  description: Assign an owner for the Cliniko subscription and SMS budget; review the practitioner band and SMS spend monthly.
