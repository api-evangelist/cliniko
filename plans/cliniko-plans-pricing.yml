created: '2026-07-12'
modified: '2026-07-12'
reconciled: false
tags:
- Practice Management
- Healthcare
- Allied Health
- SaaS
- Plans
description: >-
  Cliniko is sold as a per-practitioner SaaS subscription in US dollars, billed
  monthly, with a single feature set across every tier - the price scales with
  the number of practitioners, not with feature gating. There is a 30-day free
  trial (no upfront cost, no card required to start). Every subscription includes
  all Cliniko features, unlimited admin and reception users, unlimited locations,
  unlimited patients, unlimited file storage, and full support. The public REST
  API is part of the product and is available to subscribers at no separate
  charge. SMS messaging is billed separately as pre-paid credits (about 10 cents
  per message). The tier prices below are drawn from Cliniko's public pricing
  page and are not reconciled against a live quote here.
notes: >-
  API access carries no separate fee; it is included with a Cliniko
  subscription. SMS is pre-paid and priced per message. Verify current tier
  prices and practitioner bands on https://www.cliniko.com/pricing/ during
  reconciliation - published rates change over time.
sources:
- https://www.cliniko.com/pricing/
- https://docs.api.cliniko.com/
- https://github.com/redguava/cliniko-api
